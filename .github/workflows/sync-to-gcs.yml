name: Sync Code to Google Cloud Storage

on:
  push:
    branches:
      - master # Change this to 'master' if your default branch is called master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Sync to Cloud Storage Bucket
        run: |
          # This syncs your code while ignoring the hidden .git folder
          gsutil -m rsync -r -x "\.git/.*" ./ gs://ucpmaroc-code-bucket/
